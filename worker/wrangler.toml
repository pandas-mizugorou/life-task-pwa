# Cloudflare Worker — the GitHub API proxy. Holds the GitHub PAT as a secret so it
# never reaches the phone, and restricts every call to pandas-mizugorou/life + Project #1.
#
# Deploy:  npm run deploy:worker   (or: wrangler deploy --config worker/wrangler.toml)
# Secrets: wrangler secret put GITHUB_PAT     --config worker/wrangler.toml
#          wrangler secret put APP_PASSPHRASE --config worker/wrangler.toml
#
# notify-hub (N-13) additionally needs — see docs/notify-hub-setup.md:
#   wrangler kv namespace create PUSH_SUBS --config worker/wrangler.toml   # paste id into [[kv_namespaces]] below
#   npx web-push generate-vapid-keys                                       # generate a NEW pair (do NOT reuse family-assets')
#   wrangler secret put NOTIFY_KEY         --config worker/wrangler.toml   # PC-bridge send key
#   wrangler secret put VAPID_PUBLIC_KEY   --config worker/wrangler.toml
#   wrangler secret put VAPID_PRIVATE_KEY  --config worker/wrangler.toml
name = "life-task-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
# Comma-separated allowlist of PWA origins for CORS (REQUIRED for browser access).
# The Worker fails CLOSED: if this is unset or the request Origin isn't listed, no
# CORS header is sent and browsers block the call. Set it to your Pages URL.
# List "*" only to intentionally allow any origin (the X-App-Key passphrase is then
# the sole gate for non-browser callers).
ALLOWED_ORIGIN = "https://life-task-pwa.pages.dev"

# The Worker's own public URL (NO trailing slash). Used to build the signed
# image-proxy URLs (/api/image/<path>?sig=…) that get embedded into Markdown.
# Set it to this Worker's deployed URL. Until set, image upload returns 501.
# Images are committed into the private repo (assets/); there is NO storage bill
# (GitHub meters only Git LFS, which we don't use), and the private bytes are
# served back through the signed proxy — never exposed publicly.
WORKER_PUBLIC_URL = "https://life-task-api.mizugorou071.workers.dev"

# VAPID subject for Web Push (notify-hub / N-13). Set to a mailto: you control (or
# an https: URL of this project). The VAPID key PAIR is stored as secrets (not here).
VAPID_SUBJECT = "REPLACE_WITH_mailto:you@example.com"

# KV namespace holding one entry per active Web Push subscription. The push
# subscribe/send routes return 503 until this binding exists (older deploys keep
# working). Create the namespace, then paste its id here:
#   wrangler kv namespace create PUSH_SUBS --config worker/wrangler.toml
[[kv_namespaces]]
binding = "PUSH_SUBS"
id = "REPLACE_WITH_KV_ID"

# Per-IP brute-force throttle for FAILED passphrase attempts. Uses the Cloudflare
# Rate Limiting binding (no external resource to create). 20 failures / 60s / IP
# -> HTTP 429. The code is a no-op if this binding is absent, so existing deploys
# keep working; redeploy to enable it. namespace_id is an arbitrary integer that
# must be unique among this account's rate limiters.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# Workers Logs: capture console.error output (5xx / rate-limit diagnostics) for
# after-the-fact debugging. Free tier is fine for a single-user app. We log only
# non-sensitive detail (never the passphrase or PAT).
[observability]
enabled = true
head_sampling_rate = 1
