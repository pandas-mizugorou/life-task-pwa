    <rect x="240" y="136" width="58" height="12" rx="6" fill="#ffffff" opacity="0.55"/>
    <circle cx="370" cy="142" r="10" fill="#7ff0c0"/>
    <rect x="388" y="136" width="58" height="12" rx="6" fill="#ffffff" opacity="0.55"/>

    <rect x="58" y="178" width="100" height="80" rx="16" fill="url(#card)"/>
