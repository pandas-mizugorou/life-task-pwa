<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="0.52" stop-color="#37a7c6"/>
      <stop offset="1" stop-color="#33d08f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.26" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="0.82" cy="0.92" r="0.85">
      <stop offset="0" stop-color="#05132a" stop-opacity="0.22"/>
      <stop offset="0.65" stop-color="#05132a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37e08a"/>
      <stop offset="1" stop-color="#16ab63"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef3fb"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <rect width="512" height="512" fill="url(#shade)"/>

  <!-- kanban board scaled into the maskable safe zone (centre ~80%) -->
